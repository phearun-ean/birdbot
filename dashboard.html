<!DOCTYPE html>
<html>
<head>
    <title>Bird Nest House – Seller Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            transition: background 0.2s, color 0.2s;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        .order-card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status { font-weight: bold; }
        .status-btn {
            background: var(--tg-theme-button-color, #ff6b00);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 4px;
            cursor: pointer;
        }
        .refresh-btn {
            background: var(--tg-theme-button-color, #ff6b00);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--tg-theme-button-color, #ff6b00);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>📦 Orders</h1>
    <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
    <div id="ordersContainer"></div>
</div>

<script>
    // Telegram WebApp integration
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.show();
    tg.BackButton.onClick(() => tg.close());

    // Password protection (same as Flask route)
    const password = prompt("Enter dashboard password:");
    if (password !== "change_this_password") {
        document.body.innerHTML = "<h2>Unauthorized</h2>";
        throw new Error("Unauthorized");
    }

    async function loadOrders() {
        const container = document.getElementById('ordersContainer');
        container.innerHTML = '<div class="spinner"></div>';
        try {
            const response = await fetch('/api/orders');
            const orders = await response.json();
            if (orders.length === 0) {
                container.innerHTML = '<p>No orders yet.</p>';
                return;
            }
            orders.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            container.innerHTML = '';
            orders.forEach(order => {
                const div = document.createElement('div');
                div.className = 'order-card';
                div.innerHTML = `
                    <div><strong>${escapeHtml(order.user_name)}</strong> (${order.user_id})</div>
                    <div>Total: $${order.total}</div>
                    <div>Status: <span class="status">${order.status || 'Pending'}</span></div>
                    <div>Payment: ${order.paymentMethod || 'N/A'}</div>
                    <div>Time: ${new Date(order.timestamp).toLocaleString()}</div>
                    <div>
                        <button class="status-btn" data-id="${order.orderId}" data-status="Preparing">🔄 Preparing</button>
                        <button class="status-btn" data-id="${order.orderId}" data-status="Ready">✅ Ready</button>
                        <button class="status-btn" data-id="${order.orderId}" data-status="Completed">🏁 Completed</button>
                    </div>
                `;
                container.appendChild(div);
            });
            // Attach event listeners for status buttons
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const orderId = btn.dataset.id;
                    const newStatus = btn.dataset.status;
                    try {
                        const response = await fetch('/api/update-status', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ orderId: orderId, status: newStatus })
                        });
                        const result = await response.json();
                        if (result.success) {
                            tg.showAlert(`Order ${orderId} marked as ${newStatus}.`);
                            loadOrders(); // refresh the list
                        } else {
                            tg.showAlert(`Failed: ${result.error}`);
                        }
                    } catch (error) {
                        tg.showAlert('Error updating status');
                    }
                });
            });
        } catch (error) {
            console.error(error);
            container.innerHTML = '<p>Error loading orders. Ensure the bot is running.</p>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadOrders();
    setInterval(loadOrders, 10000);
</script>
</body>
</html>
