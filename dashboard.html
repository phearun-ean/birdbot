<!DOCTYPE html>
<html>
<head>
    <title>Bird Nest House – Seller Dashboard</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .order-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .status { font-weight: bold; }
        .status-btn { background: #e0e0e0; border: none; padding: 6px 12px; border-radius: 20px; margin: 4px; cursor: pointer; }
        .refresh-btn { margin-bottom: 20px; padding: 8px 16px; background: #ff6b00; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>📦 Orders</h1>
    <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
    <div id="ordersContainer"></div>
</div>

<script>
    const password = prompt("Enter dashboard password:");
    if (password !== "change_this_password") {
        document.body.innerHTML = "<h2>Unauthorized</h2>";
        throw new Error("Unauthorized");
    }

    async function loadOrders() {
        try {
            const response = await fetch('/api/orders');
            const orders = await response.json();
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '';
            if (orders.length === 0) {
                container.innerHTML = '<p>No orders yet.</p>';
                return;
            }
            orders.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            orders.forEach(order => {
                const div = document.createElement('div');
                div.className = 'order-card';
                div.innerHTML = `
                    <div><strong>${escapeHtml(order.user_name)}</strong> (${order.user_id})</div>
                    <div>Total: $${order.total}</div>
                    <div>Status: <span class="status">${order.status || 'Pending'}</span></div>
                    <div>Payment: ${order.paymentMethod || 'N/A'}</div>
                    <div>Time: ${new Date(order.timestamp).toLocaleString()}</div>
                    <div>
                        <button class="status-btn" data-id="${order.orderId}" data-status="Preparing">🔄 Preparing</button>
                        <button class="status-btn" data-id="${order.orderId}" data-status="Ready">✅ Ready</button>
                        <button class="status-btn" data-id="${order.orderId}" data-status="Completed">🏁 Completed</button>
                    </div>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const orderId = btn.dataset.id;
                    const newStatus = btn.dataset.status;
                    alert(`Order ${orderId} marked as ${newStatus}. (Status update not persisted yet)`);
                });
            });
        } catch (error) {
            console.error('Failed to load orders:', error);
            document.getElementById('ordersContainer').innerHTML = '<p>Error loading orders. Make sure the bot is running.</p>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadOrders();
    setInterval(loadOrders, 10000);
</script>
</body>
</html>
