<!DOCTYPE html>
<html>
<head>
    <title>Bird Nest House – Seller Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .order-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .status { font-weight: bold; }
        .status-btn { background: #e0e0e0; border: none; padding: 6px 12px; border-radius: 20px; margin: 4px; cursor: pointer; }
        .status-btn.active { background: #ff6b00; color: white; }
        .chat-preview { font-size: 0.85rem; color: #666; margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px; }
        .badge { background: #ff6b00; color: white; border-radius: 20px; padding: 2px 8px; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>📦 Orders <span id="unreadBadge" class="badge" style="display:none;"></span></h1>
    <div id="ordersContainer"></div>
</div>

<script>
    // ========== PASSWORD PROTECTION ==========
    // CHANGE THIS PASSWORD TO YOUR OWN!
    const password = prompt("Enter dashboard password:");
    if (password !== "admin123") {
        document.body.innerHTML = "<h2>Unauthorized</h2>";
        throw new Error("Unauthorized");
    }

    // Firebase configuration (same as your mini app)
    const firebaseConfig = {
        apiKey: "AIzaSyDUox5I6RG7sFABAyX_tUXi4rhiX80MDTY",
        authDomain: "birdnesttgminiapp.firebaseapp.com",
        projectId: "birdnesttgminiapp",
        storageBucket: "birdnesttgminiapp.firebasestorage.app",
        messagingSenderId: "1000241241106",
        appId: "1:1000241241106:web:d23c6df3a1723aba100ccb"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let ordersUnsubscribe = null;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderOrders() {
        if (ordersUnsubscribe) ordersUnsubscribe();
        ordersUnsubscribe = db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '';
            let totalUnread = 0;
            snapshot.forEach(doc => {
                const order = doc.data();
                const orderId = doc.id;
                const unread = order.unreadCount || 0;
                totalUnread += unread;
                const div = document.createElement('div');
                div.className = 'order-card';
                div.innerHTML = `
                    <div><strong>${escapeHtml(order.userName)}</strong> (${order.userId})</div>
                    <div>Total: $${order.total}</div>
                    <div>Status: <span class="status">${order.status || 'Pending'}</span></div>
                    <div>Payment: ${order.paymentMethod || 'N/A'}</div>
                    <div>Time: ${order.timestamp?.toDate?.()?.toLocaleString() || 'Unknown'}</div>
                    <div>
                        <button class="status-btn" data-id="${orderId}" data-status="Preparing">🔄 Preparing</button>
                        <button class="status-btn" data-id="${orderId}" data-status="Ready">✅ Ready</button>
                        <button class="status-btn" data-id="${orderId}" data-status="Completed">🏁 Completed</button>
                    </div>
                    <div class="chat-preview">
                        💬 <span id="chat-${orderId}">${unread > 0 ? `${unread} new message(s)` : 'No new messages'}</span>
                        <button onclick="openChatSidebar('${orderId}', '${escapeHtml(order.userName)}')">View Chat</button>
                    </div>
                `;
                container.appendChild(div);
            });
            // Update unread badge
            const badge = document.getElementById('unreadBadge');
            if (totalUnread > 0) {
                badge.textContent = totalUnread;
                badge.style.display = 'inline-block';
            } else badge.style.display = 'none';

            // Attach status button handlers
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const orderId = btn.dataset.id;
                    const newStatus = btn.dataset.status;
                    await db.collection("orders").doc(orderId).update({ status: newStatus });
                    alert(`Order ${orderId} marked as ${newStatus}`);
                });
            });
        });
    }

    function openChatSidebar(orderId, customerName) {
        // Create modal if not exists
        let modal = document.getElementById('chatModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'chatModal';
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.right = '0';
            modal.style.bottom = '0';
            modal.style.backgroundColor = 'rgba(0,0,0,0.5)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '1000';
            modal.innerHTML = `
                <div style="background: white; border-radius: 20px; width: 90%; max-width: 500px; height: 70%; display: flex; flex-direction: column; overflow: hidden;">
                    <div style="padding: 15px; background: #ff6b00; color: white; display: flex; justify-content: space-between;">
                        <span>Chat with <span id="chatCustomerName"></span></span>
                        <button id="closeChatModalBtn" style="background: none; border: none; color: white; font-size: 20px;">✕</button>
                    </div>
                    <div id="chatMessagesList" style="flex: 1; overflow-y: auto; padding: 15px;"></div>
                    <div style="padding: 10px; border-top: 1px solid #eee; display: flex;">
                        <input type="text" id="chatMessageInput" placeholder="Type a reply..." style="flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #ddd;">
                        <button id="sendReplyBtn" style="margin-left: 8px; background: #ff6b00; color: white; border: none; padding: 8px 16px; border-radius: 20px;">Send</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        document.getElementById('chatCustomerName').innerText = customerName;
        modal.style.display = 'flex';

        // Load messages
        const messagesDiv = document.getElementById('chatMessagesList');
        let unsub = null;
        const loadMessages = () => {
            if (unsub) unsub();
            unsub = db.collection("chat_messages").where("orderId", "==", orderId).orderBy("timestamp", "asc").onSnapshot(snapshot => {
                messagesDiv.innerHTML = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isSeller = msg.fromId === 'seller';
                    const div = document.createElement('div');
                    div.style.marginBottom = '8px';
                    div.style.textAlign = isSeller ? 'left' : 'right';
                    div.innerHTML = `<strong>${isSeller ? 'You' : escapeHtml(msg.fromName)}:</strong><br><span style="background:${isSeller ? '#e9ecef' : '#ff6b00'}; padding:6px 12px; border-radius:12px; display:inline-block; color:${isSeller ? '#000' : '#fff'};">${escapeHtml(msg.text)}</span><div style="font-size:0.7rem; margin-top:2px;">${msg.timestamp?.toDate?.()?.toLocaleTimeString() || ''}</div>`;
                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        };
        loadMessages();

        // Send reply
        const sendBtn = document.getElementById('sendReplyBtn');
        const input = document.getElementById('chatMessageInput');
        const sendReply = async () => {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            await db.collection("chat_messages").add({
                orderId: orderId,
                fromId: "seller",
                fromName: "Bird Nest House",
                text: text,
                timestamp: new Date()
            });
            // Reset unread count for this order
            await db.collection("orders").doc(orderId).update({ unreadCount: 0 });
            // Update the chat preview badge
            const badgeSpan = document.getElementById(`chat-${orderId}`);
            if (badgeSpan) badgeSpan.innerText = 'No new messages';
        };
        sendBtn.onclick = sendReply;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendReply(); };

        // Close modal
        const closeBtn = document.getElementById('closeChatModalBtn');
        const closeModal = () => {
            if (unsub) unsub();
            modal.style.display = 'none';
        };
        closeBtn.onclick = closeModal;
        window.onclick = (e) => { if (e.target === modal) closeModal(); };
    }

    renderOrders();
</script>
</body>
</html>
